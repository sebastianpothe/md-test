<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScrollTrigger + Sass</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    
    <main class="page">
      <div class="scroll-msg">Scroll</div>
      <section class="pin-section">
        <div class="intro-text">
          <h1>A multidisciplinary design entity built for adaptive brands</h1>
        </div>
        <div class="graphic-stack" aria-hidden="true">
          <div class="graphic-stack__layer graphic-stack__layer--violet"></div>
          <div class="graphic-stack__layer graphic-stack__layer--pink"></div>
          <div class="graphic-stack__layer graphic-stack__layer--yellow"></div>
          <div class="graphic-stack__layer graphic-stack__layer--white"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
